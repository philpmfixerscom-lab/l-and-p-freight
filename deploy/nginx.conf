# HTTP — ACME challenge + redirect to HTTPS when certs exist
server {
    listen 80;
    server_name dispatch.lpfreight.com lpfreight.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect to HTTPS when certificate is present (checked at runtime via include)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — primary site (certs mounted by certbot volume)
server {
    listen 443 ssl http2;
    server_name dispatch.lpfreight.com;

    ssl_certificate     /etc/letsencrypt/live/dispatch.lpfreight.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dispatch.lpfreight.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /css/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /js/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    location /app/ {
        proxy_pass http://app:8501/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location /_stcore/ {
        proxy_pass http://app:8501/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}