[server]
headless = true
address = "0.0.0.0"
port = 8501
baseUrlPath = "app"
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
serverPort = 8501

[theme]
base = "dark"
primaryColor = "#FF6B00"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
font = "sans serif"

[client]
toolbarMode = "minimal"
showErrorDetails = false

[runner]
fastReruns = true