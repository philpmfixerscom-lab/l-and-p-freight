services:
  app:
    build: .
    container_name: lp-freight-app
    restart: unless-stopped
    env_file: .env
    environment:
      - LP_WEB_MODE=1
      - LP_DATA_DIR=/data
    volumes:
      - lp-persist:/data
    expose:
      - "8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: nginx:1.27-alpine
    container_name: lp-freight-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_SSL_PORT:-443}:443"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./deploy/nginx-bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy

  certbot:
    image: certbot/certbot:latest
    container_name: lp-freight-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  lp-persist:
  certbot-www:
  certbot-certs: