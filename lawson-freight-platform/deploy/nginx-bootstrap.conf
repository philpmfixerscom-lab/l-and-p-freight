# Bootstrap config — HTTP only until Let's Encrypt certs are issued
server {
    listen 80;
    server_name dispatch.lpfreight.com lpfreight.com _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /css/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /js/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /manifest-driver.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /driver {
        return 302 /app/?view=driver;
    }

    location = /driver/ {
        return 302 /app/?view=driver;
    }

    location /app/ {
        proxy_pass http://app:8501/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    location /_stcore/ {
        proxy_pass http://app:8501/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}